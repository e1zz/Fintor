services:
  # --- Database Layer ---
  db:
    image: postgres:16-alpine
    container_name: fintor_postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintor_network

  # --- Cache & Celery Broker Layer ---
  redis:
    image: redis:5-alpine
    container_name: fintor_redis_broker
    ports:
      - "6379:6379"
    networks:
      - fintor_network

  # --- Core Django Web API Layer ---
  web:
    build: .
    container_name: fintor_django_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - fintor_network

  # --- Celery Asynchronous Processing Worker Layer ---
  celery:
    build: .
    container_name: fintor_celery_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - fintor_network

volumes:
  postgres_data:

networks:
  fintor_network:
    driver: bridge
